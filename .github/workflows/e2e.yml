name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e-localnet:
    name: E2E Tests (Localnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Aptos CLI
        run: |
          curl -fsSL "https://aptos.dev/scripts/install_cli.py" | python3
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Aptos CLI installation
        run: aptos --version

      - name: Start localnet
        run: |
          aptos node run-localnet --with-faucet --with-indexer-api --force-restart > "${{ runner.temp }}/localnet.log" 2>&1 &
          echo "LOCALNET_PID=$!" >> $GITHUB_ENV
          # Wait for localnet to be ready
          for i in $(seq 1 90); do
            if curl -s http://127.0.0.1:8080/v1 > /dev/null 2>&1; then
              echo "Localnet is ready after ~$((i * 2))s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "Localnet failed to start within 180s"
              cat "${{ runner.temp }}/localnet.log"
              exit 1
            fi
            sleep 2
          done
          # Wait for faucet to be ready
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8081/health > /dev/null 2>&1; then
              echo "Faucet is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Faucet failed to start within 60s"
              cat "${{ runner.temp }}/localnet.log"
              exit 1
            fi
            sleep 2
          done
          # Wait for indexer API to be ready
          for i in $(seq 1 60); do
            if curl -s -X POST http://127.0.0.1:8090/v1/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ processor_status { processor } }"}' 2>/dev/null | grep -q "processor_status"; then
              echo "Indexer API is ready after ~$((i * 2))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Indexer API failed to start within 120s (non-fatal, indexer tests will be skipped)"
            fi
            sleep 2
          done

      - name: Run E2E tests
        env:
          APTOS_LOCAL_FAUCET_URL: http://127.0.0.1:8081
          APTOS_LOCAL_NODE_URL: http://127.0.0.1:8080/v1
          APTOS_LOCAL_INDEXER_URL: http://127.0.0.1:8090/v1/graphql
        run: cargo test -p aptos-sdk --features "e2e,full" -- --ignored

      - name: Print localnet logs on failure
        if: failure()
        run: cat "${{ runner.temp }}/localnet.log"

      - name: Stop localnet
        if: always()
        run: |
          kill "$LOCALNET_PID" 2>/dev/null || true
          pkill -f "aptos node" || true

  e2e-coverage:
    name: E2E Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only run on main branch and daily schedule to avoid blocking PRs
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Install Aptos CLI
        run: |
          curl -fsSL "https://aptos.dev/scripts/install_cli.py" | python3
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start localnet
        run: |
          aptos node run-localnet --with-faucet --with-indexer-api --force-restart > "${{ runner.temp }}/localnet.log" 2>&1 &
          echo "LOCALNET_PID=$!" >> $GITHUB_ENV
          # Wait for localnet
          for i in $(seq 1 90); do
            if curl -s http://127.0.0.1:8080/v1 > /dev/null 2>&1; then
              echo "Localnet is ready"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "Localnet failed to start"
              cat "${{ runner.temp }}/localnet.log"
              exit 1
            fi
            sleep 2
          done
          # Wait for faucet
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8081/health > /dev/null 2>&1; then
              echo "Faucet is ready"
              break
            fi
            sleep 2
          done
          # Wait for indexer
          for i in $(seq 1 60); do
            if curl -s -X POST http://127.0.0.1:8090/v1/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ processor_status { processor } }"}' 2>/dev/null | grep -q "processor_status"; then
              echo "Indexer API is ready"
              break
            fi
            sleep 2
          done

      - name: Run E2E coverage
        env:
          APTOS_LOCAL_FAUCET_URL: http://127.0.0.1:8081
          APTOS_LOCAL_NODE_URL: http://127.0.0.1:8080/v1
          APTOS_LOCAL_INDEXER_URL: http://127.0.0.1:8090/v1/graphql
        run: cargo tarpaulin -p aptos-sdk --profile e2e --out Xml --out Html --output-dir target/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/coverage/cobertura.xml
          flags: e2e
          name: aptos-sdk-e2e-coverage
          fail_ci_if_error: false

      - name: Print localnet logs on failure
        if: failure()
        run: cat "${{ runner.temp }}/localnet.log"

      - name: Stop localnet
        if: always()
        run: |
          kill "$LOCALNET_PID" 2>/dev/null || true
          pkill -f "aptos node" || true
